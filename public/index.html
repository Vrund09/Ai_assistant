<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Avatar Assistant</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎙️</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Voice Avatar Assistant</h1>
            <p class="subtitle">Ask me anything — I'll speak the answer</p>
        </header>

        <main>
            <div class="avatar-container" id="avatarContainer">
                <div class="avatar-placeholder" id="avatarPlaceholder">
                    <div class="avatar-face" id="avatarFace">🎙️</div>
                    <div class="avatar-status" id="avatarStatus">Ready</div>
                </div>
                <video id="avatarVideo" class="avatar-video" autoplay playsinline muted></video>
            </div>

            <div class="status-bar" id="statusBar">
                <span class="status-dot" id="statusDot"></span>
                <span class="status-text" id="statusText">Waiting for your question...</span>
            </div>

            <div class="transcript" id="transcript"></div>

            <div class="conversation" id="conversation"></div>

            <div class="controls">
                <div class="input-row">
                    <input
                        type="text"
                        id="textInput"
                        class="text-input"
                        placeholder="Type your question here..."
                        maxlength="500"
                    />
                    <button id="sendBtn" class="btn btn-send" title="Send message">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
                <button id="micBtn" class="btn btn-mic" title="Hold to talk">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                        <line x1="12" y1="19" x2="12" y2="23"></line>
                        <line x1="8" y1="23" x2="16" y2="23"></line>
                    </svg>
                    <span class="btn-label">Hold to talk</span>
                </button>
            </div>
        </main>

        <footer>
            <p>Voice Avatar Assistant — Groq + Simli + Open-Meteo + edge-tts</p>
        </footer>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="app.js"></script>
</body>
</html>
